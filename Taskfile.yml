version: "3"

vars:
  BINARY_NAME: star-run
  SRC_DIR: ./src
  BIN_DIR: ./bin
  VERSION:
    sh: node -p "require('./package.json').version" 2>/dev/null || echo "dev"
  LDFLAGS: -s -w -X main.version={{.VERSION}}
  EXT: '{{if eq .OS "windows"}}.exe{{end}}'

env:
  GOFLAGS: -buildvcs=false

tasks:
  default:
    desc: Run the default local build
    cmds:
      - task: build

  install:
    desc: Install Node.js dependencies
    cmds:
      - npm install

  build:
    desc: Build the binary for the current host platform
    sources:
      - "{{.SRC_DIR}}/**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BIN_DIR}}/{{.BINARY_NAME}}{{.EXT}}"
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -ldflags="{{.LDFLAGS}}" -o {{.BIN_DIR}}/{{.BINARY_NAME}}{{.EXT}} {{.SRC_DIR}}

  build:ts:
    desc: Bundle TypeScript entrypoint with tsdown
    sources:
      - "index.ts"
      - "tsdown.config.ts"
    generates:
      - "dist/index.mjs"
    cmds:
      - npx tsdown

  build-all:
    desc: Build binaries for all supported target platforms
    deps: [clean-bin]
    cmds:
      - task: build-target
        vars:
          TARGET: "{{.ITEM}}"
        for:
          - darwin-x64|darwin|amd64|star-run
          - darwin-arm64|darwin|arm64|star-run
          - linux-x64|linux|amd64|star-run
          - linux-arm64|linux|arm64|star-run
          - win32-x64|windows|amd64|star-run.exe

  build-target:
    internal: true
    vars:
      DIR: '{{index (splitList "|" .TARGET) 0}}'
      GOOS: '{{index (splitList "|" .TARGET) 1}}'
      GOARCH: '{{index (splitList "|" .TARGET) 2}}'
      BIN: '{{index (splitList "|" .TARGET) 3}}'
    env:
      GOOS: "{{.GOOS}}"
      GOARCH: "{{.GOARCH}}"
    cmds:
      - echo "Building {{.DIR}} (GOOS={{.GOOS}} GOARCH={{.GOARCH}})..."
      - mkdir -p {{.BIN_DIR}}/{{.DIR}}
      - go build -ldflags="{{.LDFLAGS}}" -o {{.BIN_DIR}}/{{.DIR}}/{{.BIN}} {{.SRC_DIR}}
      - echo "✅ {{.DIR}}"

  test:
    desc: Run all project tests
    cmds:
      - go test -v ./...

  lint:
    desc: Run Go linter
    cmds:
      - golangci-lint run ./src/...

  precommit:
    desc: Run lint and tests before committing
    cmds:
      - task: lint
      - task: test

  clean:
    desc: Clean all build artifacts and generated npm packages
    deps: [clean-bin]
    cmds:
      - rm -rf npm/ dist/

  clean-bin:
    desc: Clean only the compiled binaries directory
    cmds:
      - rm -rf {{.BIN_DIR}}/

  package-npm:
    desc: Generate NPM distribution packages
    deps: [build-all, build:ts]
    cmds:
      - npx tsx scripts/build-npm.ts

  publish:
    desc: Publish all packages to npm via OIDC (Trusted Publishers)
    deps: [package-npm]
    cmds:
      - |
        VERSION_TAG="{{.VERSION}}"
        if [ -z "$VERSION_TAG" ]; then
          echo "Error: VERSION_TAG is empty"
          exit 1
        fi
        if echo "$VERSION_TAG" | grep -q "alpha"; then
          NPM_TAG="alpha"
        else
          NPM_TAG="latest"
        fi
        echo "Publishing with npm tag: $NPM_TAG"
        for dir in npm/star-run-*/ npm/star-run/; do
          if [ -d "$dir" ]; then
            echo "Publishing $dir..."
            (cd "$dir" && npm publish --access public --tag "$NPM_TAG" --provenance)
          fi
        done

  publish:dry:
    desc: Dry-run publish all generated NPM packages
    deps: [package-npm]
    cmds:
      - |
        for dir in npm/star-run-*/ npm/star-run/; do
          if [ -d "$dir" ]; then
            echo "Dry-running publish for $dir..."
            (cd "$dir" && npm publish --dry-run --access public --tag next)
          fi
        done

  ci:
    desc: Run full CI pipeline locally
    cmds:
      - task: clean
      - task: lint
      - task: test
      - task: package-npm
      - task: publish:dry

  version:
    desc: Print the current version from package.json
    cmds:
      - echo "{{.VERSION}}"
