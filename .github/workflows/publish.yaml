name: Publish to npm

on:
  push:
    branches:
      - release
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Crucial: fetches full history so git can inspect tracking branches

      - name: Verify Tag Exists on Release Branch
        id: branch-filter
        run: |
          # Query the remote tracking branches to see if origin/release owns this tag's commit
          if git branch -r --contains ${{ github.ref_name }} | grep -q 'origin/release'; then
            echo "Target tag belongs to the release branch. Proceeding."
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "Tag was created outside of the release branch. Skipping execution."
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Go
        if: steps.branch-filter.outputs.is_release == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true

      - name: Set up Node.js
        if: steps.branch-filter.outputs.is_release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Task
        if: steps.branch-filter.outputs.is_release == 'true'
        uses: arduino/setup-task@v3
        with:
          version: 3.x

      - name: Package npm tarballs
        if: steps.branch-filter.outputs.is_release == 'true'
        run: task package-npm

      - name: Setup npm authentication
        if: steps.branch-filter.outputs.is_release == 'true'
        run: |
          echo "//registry.npmjs.org/:_authToken=\${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish packages to NPM
        if: steps.branch-filter.outputs.is_release == 'true'
        run: |
          for dir in npm/star-run-*/ npm/star-run/; do
            if [ -d "$dir" ]; then
              cd "$dir" && npm publish --access public && cd -
            fi
          done
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
