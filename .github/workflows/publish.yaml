name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest

    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache \
            make \
            git \
            go \
            nodejs \
            npm \
            bash

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Git Safe Directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build all binaries (cross platform)
        run: make build-all

      - name: Package npm tarballs
        run: make package-npm

      # We inject the secret directly into the token variable inside .npmrc
      - name: Setup npm authentication
        run: |
          echo "//registry.npmjs.org/:_authToken=\${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Note the env variable name change to match what's inside .npmrc
      - name: Publish platform specific packages
        run: |
          cd npm
          for pkg in star-run-*/; do
            cd "$pkg"
            npm publish --access public
            cd ..
          done
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish the main wrapper
      - name: Publish main wrapper
        run: |
          cd npm/star-run
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}