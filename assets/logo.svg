<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Subtle gradient for the mountain to give depth while keeping it flat/minimal -->
    <linearGradient id="fujiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ADE80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22C55E;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect for the 'active' state feel -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background: Preferred Dark Grey -->
  <rect width="512" height="512" rx="96" fill="#2D2D2D" />

  <!-- Mountain Base / Shadow (Muted Slate Blue-Grey for depth) -->
  <path d="M100 380 L256 140 L412 380 Z" fill="#3F3F46" opacity="0.6" />

  <!-- Main Fuji-Runner Shape: Green Active State -->
  <!-- The right side of the mountain is extended into a 'run/play' arrow -->
  <path 
    d="M120 380 
       L256 160 
       L320 260 
       L390 260 
       L310 380 
       Z" 
    fill="url(#fujiGrad)" 
    filter="url(#glow)"
  />

  <!-- Snow Cap / Terminal Cursor Accent -->
  <!-- Represents the CLI nature and the 'peak' of performance -->
  <path 
    d="M256 160 
       L230 200 
       L256 190 
       L282 200 
       Z" 
    fill="#E4E4E7" 
    opacity="0.9"
  />

  <!-- Typography: Monospaced for developer tool aesthetic -->
  <text 
    x="256" 
    y="440" 
    font-family="'JetBrains Mono', 'Fira Code', monospace" 
    font-size="64" 
    font-weight="700" 
    text-anchor="middle" 
    fill="#FFFFFF"
    letter-spacing="-2">
    star<tspan fill="#4ADE80">-run</tspan>
  </text>
</svg>